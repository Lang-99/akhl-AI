<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKHL AI</title>

<!-- Font Cyber -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Judul */
h1 {
  text-align: center;
  margin-top: 30px;
  font-size: 38px;
  color: #00f0ff;
  text-shadow: 0 0 15px #00f0ff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00f0ff; }
  to { text-shadow: 0 0 30px #00f0ff; }
}

/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 30px;
  gap: 15px;
}

/* Chat Box */
.chat-box {
  width: 90%;
  max-width: 400px;
  height: 300px;
  overflow-y: auto;
  background: #020617;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 0 20px #00f0ff22;
}

/* Bubble */
.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  animation: fade 0.5s ease;
}

.user {
  background: #00f0ff22;
  text-align: right;
}

.bot {
  background: #9333ea22;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Input */
.input-area {
  display: flex;
  width: 90%;
  max-width: 400px;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
  box-shadow: 0 0 10px #00f0ff33;
}

input:focus {
  outline: none;
  box-shadow: 0 0 20px #00f0ff;
}

/* Button */
button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: #00f0ff;
  cursor: pointer;
  box-shadow: 0 0 10px #00f0ff55;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f0ff;
}

/* Menu */
.menu {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  width: 90%;
  max-width: 400px;
}
</style>
</head>

<body>

<h1>AKHL AI</h1>

<div class="container">

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Tulis pesan...">
    <button onclick="kirim()">Kirim</button>
  </div>

  <button onclick="loginGoogle()">Login Google</button>

  <div class="menu">
    <button onclick="quick('Hitung 2+2')">MTK</button>
    <button onclick="quick('Berpikir sesuatu')">Pikirkan</button>
    <button onclick="quick('Cari di web')">Web</button>
    <button onclick="quick('Buat kode')">Code+</button>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGuuXOqwE1bNNxlH8PEz4Y9jry9zz50D8",
  authDomain: "akhl-c8e44.firebaseapp.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginGoogle = function() {
  signInWithPopup(auth, provider)
    .then((result) => {
      addMsg("Login: " + result.user.displayName, "bot");
    })
    .catch((error) => {
      alert("Login gagal: " + error.message);
    });
}

// Chat function
window.kirim = function() {
  let input = document.getElementById("input");
  let text = input.value;
  if (!text) return;

  addMsg(text, "user");

  setTimeout(() => {
    addMsg("AI: " + text, "bot");
  }, 500);

  input.value = "";
}

// Quick button
window.quick = function(text) {
  document.getElementById("input").value = text;
}

// Add message
function addMsg(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
