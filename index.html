<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKHL AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.title {
  font-size: 18px;
  font-weight: 600;
}

/* 3 DOT */
.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* DROPDOWN */
.dropdown {
  position: absolute;
  right: 10px;
  top: 60px;
  background: #111;
  border-radius: 10px;
  padding: 10px;
  display: none;
  box-shadow: 0 0 10px #000;
}

.dropdown button {
  display: block;
  width: 100%;
  margin: 5px 0;
  background: none;
  color: white;
  border: none;
  text-align: left;
  padding: 10px;
  border-radius: 8px;
}

.dropdown button:hover {
  background: #222;
}

/* CHAT */
.chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #1f1f1f;
  text-align: right;
}

.bot {
  background: #141414;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

button {
  background: #111;
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 10px;
}

/* POPUP LOGIN */
.popup {
  position: fixed;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  background: #111;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.5s;
}

.popup.show {
  bottom: 20px;
}

.popup button {
  margin-top: 10px;
  width: 100%;
  background: white;
  color: black;
}

/* ANIMASI */
.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">AKHL AI</div>
  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
</div>

<div class="dropdown" id="menu">
  <button onclick="loginGoogle()">Login Google</button>
  <button onclick="cekAkun()">Akun</button>
  <button onclick="toggleTheme()">Tema Hitam/Putih</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Tanya apa aja...">
  <button onclick="kirim()">➤</button>
</div>

<div class="popup" id="popup">
  <div>Ingin lanjut chat dengan AKHL AI?</div>
  <div style="font-size:12px; opacity:0.7;">Login Google untuk fitur MTK, Web, Code+</div>
  <button onclick="loginGoogle()">Login Google</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGuuXOqwE1bNNxlH8PEz4Y9jry9zz50D8",
  authDomain: "akhl-c8e44.firebaseapp.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* MENU */
window.toggleMenu = () => {
  let m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

/* LOGIN */
window.loginGoogle = () => {
  signInWithPopup(auth, provider)
    .then(res => {
      addMsg("Login: " + res.user.displayName, "bot");
    });
}

/* LOGOUT */
window.logout = () => {
  signOut(auth);
  addMsg("Logout berhasil", "bot");
}

/* CEK AKUN */
window.cekAkun = () => {
  let user = auth.currentUser;
  if(user){
    alert("Login sebagai: " + user.displayName);
  } else {
    alert("Belum login");
  }
}

/* THEME */
window.toggleTheme = () => {
  document.body.style.background =
    document.body.style.background === "white" ? "#0a0a0a" : "white";
  document.body.style.color =
    document.body.style.color === "black" ? "white" : "black";
}

/* CHAT */
let sudahChat = false;

window.kirim = () => {
  let input = document.getElementById("input");
  let text = input.value;
  if (!text) return;

  addMsg(text, "user");

  // Easter Egg
  if (text.toLowerCase() === "ardi femboy") {
    setTimeout(() => {
      addMsg("Ya Ardi Adalah Femboy!", "bot");
    }, 500);
  } else {
    setTimeout(() => {
      addMsg("AI: " + text, "bot");
    }, 500);
  }

  input.value = "";

  // Popup setelah 5 detik
  if (!sudahChat) {
    sudahChat = true;
    setTimeout(() => {
      document.getElementById("popup").classList.add("show");
    }, 5000);
  }
}

function addMsg(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "msg " + type + " fade";
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
