<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKHL AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.profile {
  display: flex;
  align-items: center;
  gap: 8px;
}

.profile img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.menu-btn { cursor: pointer; }

.dropdown {
  position: absolute;
  right: 10px;
  top: 60px;
  background: #111;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.dropdown button {
  width: 100%;
  background: none;
  border: none;
  color: white;
  padding: 10px;
  text-align: left;
}

.logout { color: red; }

.chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.user { background: #1f1f1f; text-align: right; }
.bot { background: #141414; }

.input-area {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 12px;
  background: #111;
  border: none;
  border-radius: 10px;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #111;
  border: none;
  color: white;
  touch-action: manipulation;
}

.popup {
  position: fixed;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 15px;
  border-radius: 10px;
  transition: 0.4s;
}

.popup.show { bottom: 20px; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000cc;
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.typing {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="topbar">
  <div>AKHL AI</div>

  <div class="profile">
    <img id="pfp" style="display:none;">
    <span id="username"></span>
  </div>

  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
</div>

<div class="dropdown" id="menu">
  <button onclick="loginGoogle()">Login Google</button>
  <button onclick="openProfile()">Edit Profil</button>
  <button onclick="logout()" class="logout" id="logoutBtn" style="display:none;">Logout</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Tanya sesuatu...">
  <button type="button" onclick="kirim()">Kirim</button>
</div>

<div class="popup" id="popup">
  Login untuk fitur lengkap
  <br><button onclick="loginGoogle()">Login Google</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Edit Profil</h3>
    <input id="editName" placeholder="Nama baru"><br><br>
    <input type="file" id="editPhotoFile"><br><br>
    <button onclick="saveProfile()">Simpan</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI_API_FIREBASE_KAMU",
  authDomain: "ISI_DOMAIN_KAMU"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let pernahLogin = localStorage.getItem("login");

/* AUTH */
onAuthStateChanged(auth, user => {
  if (user) {
    username.innerText = user.displayName;
    pfp.src = user.photoURL;
    pfp.style.display = "block";
    logoutBtn.style.display = "block";

    localStorage.setItem("login", "true");
    popup.style.display = "none";
  } else {
    username.innerText = "";
    pfp.style.display = "none";
    logoutBtn.style.display = "none";
    localStorage.removeItem("login");
  }
});

window.loginGoogle = () => signInWithPopup(auth, provider);
window.logout = () => signOut(auth);

window.toggleMenu = () => {
  menu.style.display = menu.style.display === "block" ? "none" : "block";
};

window.openProfile = () => {
  if (!auth.currentUser) return alert("Login dulu!");
  modal.style.display = "flex";
};

window.saveProfile = () => {
  let user = auth.currentUser;
  if (!user) return;

  updateProfile(user, {
    displayName: editName.value || user.displayName
  });

  modal.style.display = "none";
};

/* CHAT */
let sudah = false;

window.kirim = async () => {
  let text = input.value;
  if (!text) return;

  addMsg(text, "user");

  let typing = document.createElement("div");
  typing.className = "msg bot typing";
  typing.innerText = "AI sedang mengetik...";
  chat.appendChild(typing);

  input.value = "";

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAWtLlQ5xB8adHnMrSGQ4S-T_CRNHYUens",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [{ parts: [{ text }] }]
        })
      }
    );

    const data = await res.json();

    typing.remove();

    let reply =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      "AI error";

    typeEffect(reply);

  } catch (err) {
    typing.remove();
    typeEffect("Error: " + err.message);
  }

  if (!sudah && !pernahLogin) {
    sudah = true;
    setTimeout(() => popup.classList.add("show"), 5000);
  }
};

function typeEffect(text) {
  let div = document.createElement("div");
  div.className = "msg bot";
  chat.appendChild(div);

  let i = 0;
  let interval = setInterval(() => {
    div.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 15);

  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
}
</script>

</body>
</html>
