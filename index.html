<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKHL AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.title { font-weight: 600; }

/* PROFILE */
.profile {
  display: flex;
  align-items: center;
  gap: 10px;
}

.profile img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

/* MENU */
.menu-btn { cursor: pointer; }

.dropdown {
  position: absolute;
  right: 10px;
  top: 60px;
  background: #111;
  border-radius: 10px;
  padding: 10px;
  display: none;
}

.dropdown button {
  width: 100%;
  background: none;
  border: none;
  color: white;
  padding: 10px;
  text-align: left;
}

.logout {
  color: red;
}

/* CHAT */
.chat {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.user { background: #1f1f1f; text-align: right; }
.bot { background: #141414; }

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 12px;
  background: #111;
  border: none;
  border-radius: 10px;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #111;
  border: none;
  color: white;
}

/* TYPING */
.typing {
  font-size: 12px;
  opacity: 0.6;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 15px;
  border-radius: 10px;
  transition: 0.4s;
}

.popup.show { bottom: 20px; }

/* PROFILE MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000cc;
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">AKHL AI</div>

  <div class="profile" id="profileArea">
    <img id="pfp" src="" style="display:none;">
    <span id="username"></span>
  </div>

  <div class="menu-btn" onclick="toggleMenu()">⋮</div>
</div>

<div class="dropdown" id="menu">
  <button onclick="loginGoogle()">Login Google</button>
  <button onclick="openProfile()">Edit Profil</button>
  <button onclick="logout()" class="logout" id="logoutBtn" style="display:none;">Logout</button>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Tanya sesuatu...">
  <button onclick="kirim()">➤</button>
</div>

<div class="popup" id="popup">
  Login untuk fitur lengkap
  <br><button onclick="loginGoogle()">Login Google</button>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Edit Profil</h3>
    <input id="editName" placeholder="Nama baru"><br><br>
    <input id="editPhoto" placeholder="Link foto"><br><br>
    <button onclick="saveProfile()">Simpan</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, GoogleAuthProvider, signInWithPopup, 
  signOut, onAuthStateChanged, updateProfile 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGuuXOqwE1bNNxlH8PEz4Y9jry9zz50D8",
  authDomain: "akhl-c8e44.firebaseapp.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* DETECT LOGIN */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("username").innerText = user.displayName;
    document.getElementById("pfp").src = user.photoURL;
    document.getElementById("pfp").style.display = "block";
    document.getElementById("logoutBtn").style.display = "block";
  } else {
    document.getElementById("username").innerText = "";
    document.getElementById("pfp").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";
  }
});

/* LOGIN */
window.loginGoogle = () => {
  signInWithPopup(auth, provider);
}

/* LOGOUT */
window.logout = () => {
  signOut(auth);
}

/* MENU */
window.toggleMenu = () => {
  let m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

/* PROFILE */
window.openProfile = () => {
  document.getElementById("modal").style.display = "flex";
}

window.saveProfile = () => {
  let user = auth.currentUser;
  updateProfile(user, {
    displayName: document.getElementById("editName").value,
    photoURL: document.getElementById("editPhoto").value
  });
  document.getElementById("modal").style.display = "none";
}

/* CHAT */
let sudah = false;

window.kirim = () => {
  let text = input.value;
  if (!text) return;

  addMsg(text, "user");

  let typing = document.createElement("div");
  typing.className = "msg bot typing";
  typing.innerText = "AI sedang mengetik...";
  chat.appendChild(typing);

  setTimeout(() => {
    typing.remove();

    let response = text.toLowerCase() === "ardi femboy"
      ? "Ya Ardi Adalah Femboy!"
      : "AI: " + text;

    typeEffect(response);
  }, 1000);

  input.value = "";

  if (!sudah) {
    sudah = true;
    setTimeout(() => popup.classList.add("show"), 5000);
  }
}

/* TYPE EFFECT */
function typeEffect(text) {
  let div = document.createElement("div");
  div.className = "msg bot";
  chat.appendChild(div);

  let i = 0;
  let interval = setInterval(() => {
    div.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 20);

  chat.scrollTop = chat.scrollHeight;
}

/* ADD MSG */
function addMsg(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
}
</script>

</body>
</html>
